name: KisanCall CI/CD

# ──────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ──────────────────────────────────────────────────────────────
# Global environment
# ──────────────────────────────────────────────────────────────
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kisancall
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ──────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────
jobs:

  # ============================================================
  # JOB 1 — Backend: Lint & Test
  # ============================================================
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest pytest-asyncio httpx

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (non-blocking)
          flake8 backend/ --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Run backend tests
        env:
          # Use dummy values so the app can import without real secrets
          MONGO_URI: mongodb://localhost:27017/kisancall_test
          JWT_SECRET: test_secret_key_ci
          JWT_EXPIRE_HOURS: "24"
          GROQ_API_KEY: dummy
          DEEPGRAM_API_KEY: dummy
          EMAIL_FROM: test@example.com
          EMAIL_PASSWORD: dummy
          APP_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:5173
        run: |
          # Run tests if a tests/ directory exists; skip gracefully otherwise
          if [ -d "backend/tests" ]; then
            pytest backend/tests/ -v --tb=short
          else
            echo "⚠️  No tests directory found — skipping test step."
          fi

  # ============================================================
  # JOB 2 — Frontend: Lint & Build
  # ============================================================
  frontend-ci:
    name: ⚛️ Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        # Continue even if lint has warnings (exit-zero equivalent for ESLint)
        run: npm run lint -- --max-warnings=50 || true

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================================
  # JOB 3 — Docker: Build & Push (only on push to main/master)
  # ============================================================
  docker-publish:
    name: 🐳 Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    # Only publish on direct push to main/master (not on PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Tag with the short git SHA (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Tag as "latest" on main/master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in Docker Hub registry for faster subsequent builds
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Image digest summary
        run: |
          echo "✅ Docker image published successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🔖 Tags:  ${{ steps.meta.outputs.tags }}"
